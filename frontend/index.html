<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps Portal Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="glass-card login-card">
            <h1> AIOps Portal</h1>
            <p>Enterprise Control Center</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="admin / user" required>
                </div>

                <div class="input-group" style="position: relative;">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="admin123 / user123" required
                        style="padding-right: 40px;">
                    <span id="togglePassword" style="position: absolute; right: 10px; top: 35px; cursor: pointer; opacity: 0.7;">Show</span>
                </div>

                <button type="submit" class="btn-primary">Login</button>
                <div id="errorMsg" class="error-text"></div>
            </form>

            <div class="demo-creds">
                <small>Demo: admin/admin123 | user/user123</small>
            </div>
        </div>
    </div>

    <script>
        // Password Toggle
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('password');

        togglePassword.addEventListener('click', function (e) {
            // toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // toggle the icon
            this.textContent = type === 'password' ? 'Show' : 'Hide';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            const btn = document.querySelector('button');
            const errorDiv = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.innerHTML = 'Verifying...';
            errorDiv.textContent = '';

            try {
                // Revert to relative path which is safer if served correctly
                console.log("Attempting login via /api/login...");
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                console.log("Response status:", res.status);

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.message || `Server returned ${res.status}`);
                }

                const data = await res.json();

                if (data.success) {
                    // Keep a separate token key for compatibility across admin portal versions.
                    const token = data.admin_token || data.adminToken || '';
                    if (token) localStorage.setItem('admin_token', token);
                    localStorage.setItem('user', JSON.stringify(data));
                    if (data.role === 'ADMIN') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } else {
                    errorDiv.textContent = ' ' + data.message;
                    btn.disabled = false;
                    btn.innerHTML = 'Login';
                }
            } catch (err) {
                console.error("Login Error:", err);
                // Show actual error details on screen
                errorDiv.textContent = ' Connection failed: ' + err.message;
                btn.disabled = false;
                btn.innerHTML = 'Login';
            }
        });
    </script>
</body>

</html>
